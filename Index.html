<!DOCTYPE html>
<html>
<head>
    <title>My TV Cinema</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        h1 { color: #ff0000; margin-top: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        
        .card { 
            border: 4px solid #333; margin: 15px; padding: 45px 20px; 
            width: 220px; background: #1a1a1a; cursor: pointer;
            border-radius: 15px; color: white; font-size: 1.3rem; font-weight: bold;
        }
        .card:focus, .card:hover { border-color: #ff0000; background: #333; outline: none; }

        #video-player-container { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000; z-index: 100;
        }
        /* Native video tag is better for old Android */
        video { width: 100%; height: 100%; background: #000; }
        
        .close-btn { 
            position: absolute; top: 15px; right: 15px; 
            background: #ff0000; color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; z-index: 101;
        }
    </style>
</head>
<body>

    <div id="home">
        <h1>Movie Library</h1>
        <div class="grid">
            <button class="card" onclick="playNative('https://archive.org/details/soorarai-pottru-2020-hd')">MOVIE 1</button>
            <button class="card" onclick="playNative('1JxG9gDuumNOFFMf0-fSZAp8jpkknoBrH')">MOVIE 2</button>
            <button class="card" onclick="playNative('ID_3')">MOVIE 3</button>
            <button class="card" onclick="playNative('ID_4')">MOVIE 4</button>
        </div>
    </div>

    <div id="video-player-container">
        <button class="close-btn" onclick="stopNative()">[X] CLOSE</button>
        <video id="tv-video" controls autoplay>
            <source id="video-source" src="" type="video/mp4">
            Your TV browser is too old.
        </video>
    </div>

    <script>
        function playNative(id) {
            var container = document.getElementById('video-player-container');
            var video = document.getElementById('tv-video');
            var source = document.getElementById('video-source');
            
            // Direct Link formula to bypass the Drive UI
            // Note: If files are >100MB, you MUST be logged into Chrome on the TV
            source.src = "https://drive.google.com/uc?export=download&id=" + id;
            
            container.style.display = 'block';
            video.load();
            video.play();
        }

        function stopNative() {
            var video = document.getElementById('tv-video');
            video.pause();
            document.getElementById('video-player-container').style.display = 'none';
        }
    </script>
</body>
</html>
