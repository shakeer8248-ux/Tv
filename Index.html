<!DOCTYPE html>
<html>
<head>
    <title>My TV Cinema</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        h1 { color: #ff0000; margin-top: 20px; font-size: 2rem; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        
        /* Optimized for TV Remote Selection */
        .card { 
            border: 4px solid #333; 
            margin: 15px; 
            padding: 50px 20px; 
            width: 220px; 
            background: #1a1a1a;
            cursor: pointer;
            border-radius: 15px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .card:focus, .card:hover { 
            border-color: #ff0000; 
            background: #444; 
            outline: none;
            transform: scale(1.1);
        }

        #player-layer { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 100;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .close-btn { 
            position: absolute; 
            top: 15px; right: 15px; 
            background: #ff0000; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 101;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>Movie Library</h1>
        <div class="grid">
            <button class="card" onclick="play('17tCQAE6eeFs7esRpV-ul9lRujsg4bQfE')">MOVIE 1</button>
            
            <button class="card" onclick="play('1JxG9gDuumNOFFMf0-fSZAp8jpkknoBrH')">MOVIE 2</button>
            
            <button class="card" onclick="play('ID_3_HERE')">MOVIE 3</button>
            
            <button class="card" onclick="play('ID_4_HERE')">MOVIE 4</button>
        </div>
    </div>

    <div id="player-layer">
        <button class="close-btn" onclick="stopVideo()">CLOSE [X]</button>
        <iframe id="video-frame" src="" allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        function play(id) {
            var player = document.getElementById('player-layer');
            var iframe = document.getElementById('video-frame');
            
            iframe.src = "https://drive.google.com/file/d/" + id + "/preview";
            player.style.display = 'block';
        }

        function stopVideo() {
            var player = document.getElementById('player-layer');
            var iframe = document.getElementById('video-frame');
            
            iframe.src = ""; 
            player.style.display = 'none';
        }
    </script>
</body>
</html>
