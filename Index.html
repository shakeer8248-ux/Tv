<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Site</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 50px 20px; }
        
        .card { 
            border: 2px solid #444; margin: 15px; padding: 40px; 
            width: 250px; background: #111; cursor: pointer;
            border-radius: 12px; transition: 0.3s;
        }
        .card:hover { border-color: #e50914; background: #222; }
        .card h3 { margin: 0; font-size: 1.2rem; }

        #player-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000; z-index: 100;
        }
        video { width: 100%; height: 100%; }
        .close-btn { 
            position: absolute; top: 20px; right: 20px; 
            background: #e50914; color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; z-index: 101;
        }
    </style>
</head>
<body>

    <h1>My Movie Collection</h1>

    <div class="grid">
        <div class="card" onclick="playMovie('https://archive.org/download/soorarai-pottru-2020-hd/Soorarai%20Pottru%20%282020%29%20HD.mp4')">
            <h3>🎬 Soorarai Pottru</h3>
        </div>

        <div class="card" onclick="playMovie('https://drive.google.com/uc?export=download&id=17tCQAE6eeFs7esRpV-ul9lRujsg4bQfE')">
            <h3>🎬 Movie 2</h3>
        </div>
    </div>

    <div id="player-overlay">
        <button class="close-btn" onclick="closePlayer()">CLOSE [X]</button>
        <video id="main-video" controls>
            <source id="video-src" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        function playMovie(url) {
            const overlay = document.getElementById('player-overlay');
            const video = document.getElementById('main-video');
            const source = document.getElementById('video-src');
            
            source.src = url;
            overlay.style.display = 'block';
            video.load();
            video.play();
        }

        function closePlayer() {
            const video = document.getElementById('main-video');
            video.pause();
            document.getElementById('player-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
