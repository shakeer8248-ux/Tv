<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Vault</title>
    <style>
        :root { --accent: #ff4b2b; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 40px 20px; }
        h1 { font-size: 2.5rem; margin: 0; letter-spacing: 2px; }
        h1 span { color: var(--accent); }

        /* Movie Selection Grid */
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 50px 20px;
            width: 220px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .movie-card:hover {
            border-color: var(--accent);
            background: #252525;
            transform: scale(1.05);
        }

        /* Speed-Optimized Player Overlay */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .close-btn {
            position: absolute;
            top: 20px; left: 20px;
            background: var(--accent);
            color: white; border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <header>
        <h1>MOVIE<span>VAULT</span></h1>
        <p>Your personal fast-streaming library</p>
    </header>

    <div class="grid">
        <div class="movie-card" onclick="fastPlay('17tCQAE6eeFs7esRpV-ul9lRujsg4bQfE')">
            🎬 MOVIE 1
        </div>

        <div class="movie-card" onclick="fastPlay('1JxG9gDuumNOFFMf0-fSZAp8jpkknoBrH')">
            🎬 MOVIE 2
        </div>

        <div class="movie-card" onclick="fastPlay('ID_HERE')">
            🎬 MOVIE 3
        </div>

        <div class="movie-card" onclick="fastPlay('ID_HERE')">
            🎬 MOVIE 4
        </div>
    </div>

    <div id="player-overlay">
        <button class="close-btn" onclick="stopPlay()">← BACK TO LIST</button>
        <video id="video-engine" controls preload="auto">
            <source id="video-source" src="" type="video/mp4">
            Your browser does not support high-speed streaming.
        </video>
    </div>

    <script>
        function fastPlay(fileId) {
            const overlay = document.getElementById('player-overlay');
            const video = document.getElementById('video-engine');
            const source = document.getElementById('video-source');

            // Force Google to serve raw data for speed
            const directLink = `https://drive.google.com/uc?export=download&id=${fileId}`;

            source.src = directLink;
            overlay.style.display = 'block';
            
            // Start loading and playing immediately
            video.load();
            video.play().catch(e => console.log("User interaction required to start."));
        }

        function stopPlay() {
            const video = document.getElementById('video-engine');
            const source = document.getElementById('video-source');
            
            video.pause();
            source.src = ""; // Clear memory buffer
            document.getElementById('player-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
