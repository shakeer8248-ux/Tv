<!DOCTYPE html>
<html>
<head>
    <title>My Private TV</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 40px; }
        
        .movie-card { 
            border: 4px solid #444; 
            margin: 15px; 
            padding: 50px 20px; 
            width: 200px; 
            background: #222;
            cursor: pointer;
            border-radius: 15px;
            color: white;
            font-size: 1.5rem;
        }
        .movie-card:focus, .movie-card:hover { 
            border-color: #00ff00; 
            background: #333; 
            outline: none;
        }

        #video-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 100;
        }
        video { width: 100%; height: 100%; background: #000; }
        
        .close-btn { 
            position: absolute; 
            top: 20px; right: 20px; 
            background: red; 
            color: white; 
            padding: 10px 20px; 
            border: none;
            cursor: pointer;
            z-index: 101;
        }
    </style>
</head>
<body>

    <div id="gallery">
        <h1>Select a Movie</h1>
        <div class="grid">
            <button class="movie-card" onclick="start('https://archive.org/details/soorarai-pottru-2020-hd')">Movie 1</button>
            <button class="movie-card" onclick="start('URL_2')">Movie 2</button>
            <button class="movie-card" onclick="start('URL_3')">Movie 3</button>
            <button class="movie-card" onclick="start('URL_4')">Movie 4</button>
        </div>
    </div>

    <div id="video-overlay">
        <button class="close-btn" onclick="stop()">CLOSE [X]</button>
        <video id="tv-player" controls autoplay>
            <source id="video-src" src="" type="video/mp4">
            Your TV browser is too old for this video.
        </video>
    </div>

    <script>
        function start(link) {
            var player = document.getElementById('tv-player');
            var source = document.getElementById('video-src');
            
            source.src = link;
            document.getElementById('video-overlay').style.display = 'block';
            player.load();
            player.play();
        }

        function stop() {
            var player = document.getElementById('tv-player');
            player.pause();
            document.getElementById('video-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
